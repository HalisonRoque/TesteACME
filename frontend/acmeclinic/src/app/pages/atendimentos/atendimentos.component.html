<div class="container">
  <div class="header">
    <h1>Atendimentos</h1>

    <button mat-raised-button (click)="abrirModal()">
      <mat-icon> add </mat-icon>
      Novo Atendimento
    </button>
  </div>

  <mat-card class="filter-card">
    <mat-card-content>
      <div class="filters">
        <mat-form-field appearance="outline">
          <input matInput placeholder="Paciente" [(ngModel)]="pacienteBusca" (ngModelChange)="filtrarPacientes()"
            [matAutocomplete]="auto" />

          <mat-autocomplete #auto="matAutocomplete" (optionSelected)="selecionarPaciente($event.option.value)">
            <mat-option [value]="null"> Todos </mat-option>
            <mat-option *ngFor="let paciente of pacientesFiltrados" [value]="paciente">
              {{ paciente.nome }}
            </mat-option>
          </mat-autocomplete>
        </mat-form-field>

        <mat-form-field appearance="outline" class="periodo-field" subscriptSizing="dynamic">
          <mat-label>Período</mat-label>
          <mat-date-range-input [formGroup]="range" [rangePicker]="picker">
            <input matStartDate formControlName="start" placeholder="Data início" />
            <input matEndDate formControlName="end" placeholder="Data fim" />
          </mat-date-range-input>

          <mat-datepicker-toggle matIconSuffix [for]="picker">
          </mat-datepicker-toggle>

          <mat-date-range-picker #picker> </mat-date-range-picker>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-select placeholder="Status" [(ngModel)]="filter.status">
            <mat-option value=""> Todos </mat-option>
            <mat-option value="Ativo"> Ativo </mat-option>
            <mat-option value="Inativo"> Inativo </mat-option>
          </mat-select>
        </mat-form-field>

        <div class="actions">
          <button mat-raised-button color="primary" (click)="aplicarFiltro()">
            <mat-icon> search </mat-icon>
            Filtrar
          </button>

          <button *ngIf="temFiltroAtivo()" mat-stroked-button color="warn" (click)="limparFiltro()">
            <mat-icon> close </mat-icon>
            Limpar
          </button>
        </div>
      </div>
    </mat-card-content>
  </mat-card>

  <mat-card class="table-card">
    <mat-card-content>
      <table mat-table [dataSource]="atendimentos">
        <ng-container matColumnDef="paciente">
          <th mat-header-cell *matHeaderCellDef>Paciente</th>
          <td mat-cell *matCellDef="let row">
            {{ row.pacienteNome }}
          </td>
        </ng-container>

        <ng-container matColumnDef="data">
          <th mat-header-cell *matHeaderCellDef>Data</th>
          <td mat-cell *matCellDef="let row">
            {{ row.data }}
          </td>
        </ng-container>

        <ng-container matColumnDef="hora">
          <th mat-header-cell *matHeaderCellDef>Horário</th>
          <td mat-cell *matCellDef="let row">
            {{ row.hora }}
          </td>
        </ng-container>

        <ng-container matColumnDef="descricao">
          <th mat-header-cell *matHeaderCellDef>Descrição</th>
          <td mat-cell *matCellDef="let row">
            {{ row.descricao }}
          </td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let row">
            <span class="status-badge" [ngClass]="{
              'status-ativo': row.status === 'Ativo',
              'status-inativo': row.status === 'Inativo'
            }">
              {{ row.status }}
            </span>
          </td>
        </ng-container>

        <ng-container matColumnDef="acoes">
          <th mat-header-cell *matHeaderCellDef>Ações</th>
          <td mat-cell *matCellDef="let row">
            <div class="table-actions-container">

              <button mat-button class="btn-table-edit" (click)="abrirModal(row)">
                <mat-icon>edit</mat-icon>
                <span>Editar</span>
              </button>

              <button *ngIf="row.status === 'Ativo'" mat-button class="btn-table-danger" (click)="inativar(row.id)"
                matTooltip="Inativar">
                <mat-icon>block</mat-icon>
                <span>Inativar</span>
              </button>

              <button *ngIf="row.status === 'Inativo'" mat-button class="btn-table-success" (click)="ativar(row.id)"
                matTooltip="Ativar">
                <mat-icon>check_circle</mat-icon>
                <span>Ativar</span>
              </button>

            </div>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>

      <mat-paginator [length]="total" [pageSize]="10" [pageSizeOptions]="[10]" (page)="trocarPagina($event)">
      </mat-paginator>
    </mat-card-content>
  </mat-card>
</div>
