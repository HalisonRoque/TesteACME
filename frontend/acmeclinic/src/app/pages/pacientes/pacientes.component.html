<div class="container">
  <div class="header">
    <h1>Pacientes</h1>

    <button mat-raised-button (click)="abrirModal()">
      <mat-icon> add </mat-icon>
      Novo Paciente
    </button>
  </div>

  <mat-card class="filter-card">
    <mat-card-content>
      <div class="filters">
        <mat-form-field appearance="outline">
          <input matInput placeholder="Nome" [(ngModel)]="filter.nome" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <input matInput placeholder="CPF" [(ngModel)]="filter.cpf" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-select placeholder="Status" [(ngModel)]="filter.status">
            <mat-option value=""> Todos </mat-option>

            <mat-option value="ATIVO"> Ativo </mat-option>

            <mat-option value="INATIVO"> Inativo </mat-option>
          </mat-select>
        </mat-form-field>

        <button mat-raised-button (click)="aplicarFiltro()">
          <mat-icon>search</mat-icon>

          Filtrar
        </button>
      </div>
    </mat-card-content>
  </mat-card>

  <mat-card class="table-card">
    <mat-card-content>
      <table mat-table [dataSource]="pacientes">
        <ng-container matColumnDef="nome">
          <th mat-header-cell *matHeaderCellDef>Nome</th>

          <td mat-cell *matCellDef="let row">
            {{ row.nome }}
          </td>
        </ng-container>

        <ng-container matColumnDef="cpf">
          <th mat-header-cell *matHeaderCellDef>CPF</th>

          <td mat-cell *matCellDef="let row">
            {{ row.cpf }}
          </td>
        </ng-container>

        <ng-container matColumnDef="sexo">
          <th mat-header-cell *matHeaderCellDef>Sexo</th>

          <td mat-cell *matCellDef="let row">
            {{ row.sexo }}
          </td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>

          <td mat-cell *matCellDef="let row">
            {{ row.status }}
          </td>
        </ng-container>

        <ng-container matColumnDef="acoes">
          <th mat-header-cell *matHeaderCellDef>Ações</th>

          <td mat-cell *matCellDef="let row">
            <button mat-icon-button (click)="abrirModal(row)">
              <mat-icon>edit</mat-icon>
            </button>

            <button mat-icon-button (click)="inativar(row.id)">
              <mat-icon>block</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>

      <mat-paginator
        [length]="total"
        [pageSize]="10"
        [pageSizeOptions]="[10]"
        (page)="trocarPagina($event)"
      >
      </mat-paginator>
    </mat-card-content>
  </mat-card>
</div>
