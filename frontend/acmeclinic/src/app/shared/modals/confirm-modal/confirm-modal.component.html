<h2 mat-dialog-title>
  {{ data.titulo }}
</h2>

<mat-dialog-content>
  <p class="message">
    {{ data.mensagem }}
  </p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-stroked-button (click)="cancelar()">Cancelar</button>
  <button mat-raised-button color="warn" (click)="confirmar()">
    Confirmar
  </button>
</mat-dialog-actions>
